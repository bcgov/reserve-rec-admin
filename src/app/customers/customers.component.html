<div class="container-fluid p-4">
  <!-- Header Section -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Customers</h2>
    <div class="d-flex gap-2">
      <button class="btn btn-primary" (click)="printCustomers()">
        <i class="bi bi-printer"></i> Print
      </button>
      <button class="btn btn-primary" (click)="createNewCustomer()">
        <i class="bi bi-plus-circle"></i> Create New
      </button>
    </div>
  </div>

  <!-- Search and Filter Section -->
  <div class="d-flex justify-content-end align-items-center mb-3 gap-2">
    <input 
      type="text" 
      class="form-control" 
      style="max-width: 300px;"
      [(ngModel)]="searchQuery"
      (keyup.enter)="onSearch()"
      placeholder="Search by name, phone number etc.">
    <button class="btn btn-outline-primary" (click)="onSearch()" [disabled]="loading">
      <i class="bi bi-search"></i> Search
    </button>
    <button class="btn btn-outline-primary" (click)="openFilters()" [disabled]="loading">
      <i class="bi bi-funnel"></i> Filters
    </button>
  </div>

  <!-- Loading Spinner -->
  <div *ngIf="loading && customers.length === 0" class="text-center py-5">
    <div class="spinner-border" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
  </div>

  <!-- No Results -->
  <div *ngIf="!loading && customers.length === 0" class="alert alert-info">
    No customers found.
  </div>

  <!-- Customers Table -->
  <div *ngIf="customers.length > 0" class="table-responsive">
    <table class="table table-hover">
      <thead class="table-light">
        <tr>
          <th *ngFor="let column of getVisibleColumns()" 
              [class.sortable]="column.sortable"
              [class.user-select-none]="column.sortable"
              [style.cursor]="column.sortable ? 'pointer' : 'default'"
              (click)="column.sortable ? sortBy(column.field) : null">
            {{ column.label }}
            <i *ngIf="column.sortable" class="bi small opacity-75" [ngClass]="getSortIcon(column.field)"></i>
          </th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let customer of customers">
          <td *ngFor="let column of getVisibleColumns()">
            <span *ngIf="column.field === 'activeBooking'" class="badge bg-secondary">No Active Booking</span>
            <span *ngIf="column.field !== 'activeBooking'">{{ getValue(customer, column.field) }}</span>
          </td>
          <td>
            <div class="d-flex gap-1">
              <button class="btn btn-sm btn-outline-primary" (click)="viewCustomer(customer)">
                <i class="bi bi-eye"></i> View
              </button>
              <button class="btn btn-sm btn-outline-secondary" (click)="editCustomer(customer)">
                <i class="bi bi-pencil"></i> Edit
              </button>
              <button class="btn btn-sm btn-outline-info" (click)="copyCustomer(customer)">
                <i class="bi bi-clipboard"></i> Copy
              </button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Load More Button -->
  <div *ngIf="hasMore" class="text-center mt-3">
    <button class="btn btn-secondary" (click)="loadMore()" [disabled]="loading">
      <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
      Load More
    </button>
  </div>
</div>

<!-- Filter Modal -->
<div class="modal" [class.show]="showFilterModal" [style.display]="showFilterModal ? 'block' : 'none'" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Column Filters</h5>
        <button type="button" class="btn-close" (click)="closeFilterModal()" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <p class="text-muted small mb-3">Select which columns to display in the table</p>
        <div class="form-check mb-2" *ngFor="let column of availableColumns">
          <input 
            class="form-check-input" 
            type="checkbox" 
            [id]="'column-' + column.field"
            [(ngModel)]="column.visible">
          <label class="form-check-label" [for]="'column-' + column.field">
            {{ column.label }}
          </label>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" (click)="closeFilterModal()">Close</button>
      </div>
    </div>
  </div>
</div>
<div class="modal-backdrop fade" [class.show]="showFilterModal" *ngIf="showFilterModal"></div>
