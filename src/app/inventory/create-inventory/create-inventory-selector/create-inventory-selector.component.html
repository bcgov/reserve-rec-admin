<div class="h-100 selector-button border border-3 rounded" [ngClass]="getButtonClasses()">
  <button
    [disabled]="disabled"
    class="selector-body btn d-flex flex-column align-items-center p-3 position-relative"
    [routerLink]="link"
  >
    <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-white text-primary"></span>
    <i class="{{ icon }} fa-2xl my-3 text-primary"></i>
    <span
      class="text-center fs-4 text-white px-3 m-3 lowercase"
      [ngClass]="titleClasses"
    >{{ title }}</span>
    <div class="text-center">{{ description }}</div>

  </button>
