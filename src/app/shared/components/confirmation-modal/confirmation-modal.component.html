<div class="modal-header">
  <h4 class="modal-title">{{ title }}</h4>
  <button type="button" class="btn-close" aria-label="Close" (click)="cancelButton.emit()"></button>
</div>
<div class="modal-body">
  <p *ngIf="body">{{ body }}</p>
  <div *ngFor="let row of details">
    <strong>{{ row.label }}:</strong><br>
    {{ row.eitherOr ? row.eitherOr(row.value) : row.value }}
    <br><br>
  </div>
</div>
<div class="modal-footer">
  <button type="button" class="{{ cancelClass }}" (click)="onCancel()">{{ cancelText }}</button>
  <button type="button" class="{{ confirmClass }}" (click)="confirmButton.emit()">{{ confirmText }}</button>
</div>
