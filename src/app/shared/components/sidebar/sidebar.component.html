<nav class="h-100 bg-secondary text-white" id="sidebar" [class.is-open]="isOpen">
  <div class="d-flex flex-column h-100 pb-3">
      <ul class="list-unstyled components ms-3 pe-3">
        <li routerLinkActive="text-bcgold" [routerLinkActiveOptions]="{ exact: true }">
          <a routerLink="/dashboard" *appPermissionRequired="'limited'"><i class="fa-solid fa-gauge"></i> Dashboard</a>
        </li>
        <li routerLinkActive="text-bcgold">
          <a routerLink="/sales/pass-search" *appPermissionRequired="'staff'"><i class="fa-solid fa-cash-register"></i> Sales</a>
        </li>
        <li routerLinkActive="text-bcgold">
          <a routerLink="/reports" *appPermissionRequired="'limited'"><i class="fa-solid fa-chart-bar"></i> Reports</a>
        </li>
        <li routerLinkActive="text-bcgold">
          <a routerLink="/inventory" *appPermissionRequired="'limited'"><i class="fa-solid fa-user"></i> Inventory</a>
        </li>
        <li routerLinkActive="text-bcgold">
          <a class="sidebar-hover" routerLink="/customers" *appPermissionRequired="'staff'"><i class="fa-solid fa-users"></i> Customers</a>
        </li>
        <ng-container *appPermissionRequired="'superadmin'">
          <li class="mt-3 mb-1"><small class="text-white-50">Superadmin Settings</small></li>
          <li routerLinkActive="text-bcgold">
            <a routerLink="/admin/feature-flags"><i class="fa-solid fa-toggle-on"></i> Feature Flags</a>
          </li>
          <li routerLinkActive="text-bcgold">
            <a routerLink="/admin/waiting-room"><i class="fa-solid fa-door-open"></i> Waiting Room</a>
          </li>
        </ng-container>
      </ul>
      <button type="button"
              *ngIf="authService.user()"
              class="logout-btn account-btn btn text-primary bg-light fw-bold rounded-1"
              (click)="logout()">Log Out</button>
  </div>
</nav>
