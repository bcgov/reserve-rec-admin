<div class="card-body m-1 border border-2 rounded-3 d-flex justify-content-between entity-select-item"
  [class.selected]="selected" [ngClass]="config?.cardClass" tabindex="0">
  <div class="p-3 w-100">
    <div class="mb-1">
      {{ entity?.displayName || entity?.name }}
    </div>
    <div class="d-flex flex-wrap gap-1">
      <!-- Schema badge -->
      <div class="badge bg-primary">
        {{ config?.schema | titlecase }}
      </div>

      <!-- Collection ID badge -->
      <div class="badge bg-secondary" *ngIf="entity?.collectionId">
        {{ entity.collectionId }}
      </div>

      <!-- Primary badge (e.g., facilityType, activityType) -->
      <div class="badge bg-primary" *ngIf="config?.primaryBadgeField && entity[config.primaryBadgeField]">
        {{ entity[config.primaryBadgeField] | titlecase }}
      </div>

      <!-- Custom badge fields -->
      <div *ngFor="let badgeField of config?.badgeFields" class="badge" [ngClass]="badgeField.class || 'bg-secondary'">
        {{ badgeField.label || '' }}{{ entity[badgeField.field] }}
      </div>

      <!-- Identifier badge -->
      <div class="badge bg-secondary">
        #{{ getIdentifier() }}
      </div>

      <!-- Version badge -->
      <div class="badge bg-light text-muted border border-1" *ngIf="entity[config?.versionField || 'version']">
        v{{ entity[config?.versionField || 'version'] }}
      </div>
    </div>
  </div>

  <!-- Image thumbnail -->
  <div class="p-1" *ngIf="config?.showImage !== false">
    <div class="d-flex align-items-center justify-content-center">
      <div class="border border-1 rounded-3" style="width: 100px; height: 80px; overflow: hidden;">
        <img *ngIf="getImageUrl()" [src]="getImageUrl()" [alt]="entity?.displayName || 'Image'" width="100%"
          height="80px" style="object-fit: cover;" />
        <div *ngIf="!getImageUrl()" class="text-muted d-flex justify-content-center align-items-center h-100">
          <small>No image</small>
        </div>
      </div>
    </div>
  </div>
</div>
