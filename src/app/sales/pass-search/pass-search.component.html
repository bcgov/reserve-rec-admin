<div class="container-fluid p-0">

  <div class="row justify-content-center g-3 m-0 p-3 pb-4 bg-white border border-top-0 mb-4">
    <div class="col-12 col-md-8">
      <div class="input-group">
        <input type="text" class="form-control" placeholder="Search by name, confirmation ID, etc."
          [(ngModel)]="keyword" (keyup.enter)="search()" [disabled]="isLoading">
        <button class="btn btn-primary d-none d-md-block" type="button" (click)="search()" [disabled]="isLoading">
          Search
        </button>
      </div>
    </div>
    <div class="col-12 d-md-none">
      <button class="btn btn-primary w-100 py-2" type="button" (click)="search()" [disabled]="isLoading">
        Search
      </button>
    </div>
    <div class="col-12 col-md-4 d-flex justify-content-md-end">
      <button
        class="btn btn-outline-primary d-flex flex-grow-1 flex-md-grow-0 justify-content-center align-items-center py-2"
        type="button" (click)="toggleFilterPanel()" [disabled]="isLoading">
        <i class="fa-regular me-2" [ngClass]="showFilterPanel ? 'fa-square-minus' : 'fa-square-plus'"></i>
        Filters
      </button>
    </div>

    <div *ngIf="showFilterPanel" class="col-12">
      <div class="row pt-3 gap-lg-0 gap-md-0 gap-sm-3">
        <div class="col-12">
          <hr class="mt-1 mb-4">
        </div>
        <div class="col-12 col-md-3">
          <span class="form-label small">Email</span>
          <input type="email" class="form-control" placeholder="name@example.com" [(ngModel)]="filterCriteria.email"
            [ngModelOptions]="{ updateOn: 'blur' }" (ngModelChange)="onFilterChange()">
        </div>
        <div class="col-12 col-md-3">
          <span class="form-label small">Check-in status</span>
          <select class="form-select" [(ngModel)]="filterCriteria.checkinStatus" (ngModelChange)="onFilterChange()">
            <option value="">All statuses</option>
            <option value="reserved">Reserved</option>
            <option value="active">Active</option>
            <option value="cancelled">Cancelled</option>
            <option value="expired">Expired</option>
          </select>
        </div>
        <div class="col-12 col-md-3">
          <span class="form-label small">Start date</span>
          <input type="date" class="form-control" [(ngModel)]="filterCriteria.startDate"
            (ngModelChange)="onFilterChange()">
        </div>
        <div class="col-12 col-md-3">
          <span class="form-label small">End date</span>
          <input type="date" class="form-control" [(ngModel)]="filterCriteria.endDate"
            (ngModelChange)="onFilterChange()">
        </div>
      </div>
    </div>

    <div *ngIf="filtersApplied" class="col-12">
      <div class="filters-applied-bar d-flex justify-content-between align-items-center px-3 py-2 bg-info mb-3">
        <span class="small">Filters applied</span>
        <button class="btn btn-link btn-sm p-0 text-decoration-none" type="button" (click)="clearAllFilters()">
          Clear all filters <i class="fa-solid fa-xmark ms-1"></i>
        </button>
      </div>
    </div>
  </div>

  <div class="row" *ngIf="isLoading">
    <div class="col text-center py-5">
      <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
      <p class="mt-2">Loading...</p>
    </div>
  </div>

  <div *ngIf="!isLoading && bookings.length === 0"
    class="bg-dark-subtle d-flex justify-content-center align-items-center search-pass">
    <span class="text-muted">Search for a pass to check-in</span>
  </div>

  <div *ngIf="!isLoading">
    <app-pass-details
      *ngFor="let booking of bookings"
      [booking]="booking"
    >
    </app-pass-details>

  </div>

  <div *ngIf="totalPages > 1 && !isLoading" class="d-flex align-items-center justify-content-center px-4 py-3">
    <div class="row" *ngIf="isLoadingMore">
      <div class="col text-center py-5">
        <div class="spinner-border text-primary" role="status">
          <span class="visually-hidden">Loading...</span>
        </div>
        <p class="mt-2">Loading...</p>
      </div>
    </div>
    <button
      *ngIf="!isLoadingMore && currentPage < totalPages - 1"
      class="btn btn-outline-primary"
      (click)="goToPage(currentPage + 1)">
      Load more
    </button>
  </div>
</div>
