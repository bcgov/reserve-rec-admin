
<section class="container pt-5">
  <div class="row d-flex justify-content-between align-items-start">
    <div class="col-auto ps-4 pe-4">
      <div class="row">
        <div class="col-auto">
          <h2>{{data?.displayName || "&lt;Collection not found&gt; "}}</h2>
        </div>
        <div class="col-auto">
          <div *ngIf="data" class="badge bg-primary d-flex justify-content-between align-items-center rounded-pill px-3 mb-1">
            <i class="fa-solid fa-map-location-dot me-2 fa-xl"></i>
            <h4 class="mb-0">{{data?.schema | titlecase }}</h4>
          </div>
        </div>
      </div>
      <div class="row mb-4">
        <div class="mt-3">
          <div
            *ngTemplateOutlet="typeBadge"
            class="align-self-start"
          >
          </div>
        </div>
      </div>
    </div>
    <div class="col-auto mt-3 mt-lg-1 ps-4 pe-4" *ngIf="!isEditing">
      <div class="d-flex justify-content-end align-items-center gap-2">
        <button
          class="btn btn-outline-danger rounded-1"
          (click)="onDelete()"
          *appPermissionRequired="'superadmin'"
        >
          <div class="col-auto">
            Delete
          </div>
        </button>
        <button 
          class="btn btn-outline-secondary rounded-1"
          (click)="navToEdit()"
          *appPermissionRequired="'staff' ; collection: data?.collectionId"
        >
          <div class="col-auto">
            Edit
          </div>
        </button>
      </div>
    </div>
  </div>

</section>
<div class="container">
  <router-outlet></router-outlet>
</div>

<ng-template
  #typeBadge
  let-type="type"
>
  <span class="d-inline-flex mt-2 p2">Last edited {{ data?.lastUpdated | date:'YYYY-LL-dd, h:mma' }}</span>
</ng-template>
