<section class="container justify-content-center my-5">
  <app-breadcrumb [items]="breadcrumbs"></app-breadcrumb>
  <div *ngIf="showSelectionOptions()">
  <h3>Create new inventory</h3>
    <div class="mb-3">
      Select the type of inventory item you'd like to create:
    </div>
    <div class="row row-cols-1 row-cols-md-3 g-4 mb-5">
      <div class="col mt-5" *appPermissionRequired="'superadmin'">
        <app-create-inventory-selector
          title="Collection"
          titleClasses="bg-secondary rounded-pill"
          description="Collections are a stable identifier that links all geozones, facilities, activities, and corresponding entities within an operational grouping."
          icon="fa-solid fa-folder"
          link="/inventory/create/collection"
        ></app-create-inventory-selector>
      </div>
      <div class="col mt-5">
        <app-create-inventory-selector
        title="Geozone"
        titleClasses="bg-secondary rounded-pill"
        description="Geozones are geospatial regions defined by a bounding box that group together activities and facilities that are interrelated."
        icon="fa-solid fa-map-location-dot"
        link="/inventory/create/geozone"
        ></app-create-inventory-selector>
      </div>
      <div class="col mt-5">
        <app-create-inventory-selector
          title="Facility"
          titleClasses="bg-secondary rounded-pill"
          description="Facilities are specific geospatial locations defined by a latitude and longitude and can represent the location of campgrounds, trails, structures, natural features, and other amenities."
          icon="fa-solid fa-location-dot"
          link="/inventory/create/facility"
        ></app-create-inventory-selector>
      </div>
      <div class="col mt-5">
        <app-create-inventory-selector
          title="Activity"
          titleClasses="bg-secondary rounded-pill"
          description="Activities are specific experiences that are offered at facilities or within geozones, such as camping, day use experiences, boating, and more."
          icon="fa-solid fa-campground"
          link="/inventory/create/activity"
        ></app-create-inventory-selector>
      </div>
      <div class="col mt-5">
        <app-create-inventory-selector
          title="Product"
          titleClasses="bg-secondary rounded-pill"
          description="Products are activities that can be booked such as campsites, or permits."
          icon="fa-solid fa-ticket"
          link="/inventory/create/product"
        ></app-create-inventory-selector>
      </div>
      <div class="col mt-5">
        <app-create-inventory-selector
          title="Policy"
          titleClasses="bg-secondary rounded-pill"
          description="Policies are simple rulesets that govern how a product can be booked, such as cancellation policies, booking windows, fee structures, party sizes, and more."
          icon="fa-solid fa-file-pen"
          link="/inventory/create/policy"
        ></app-create-inventory-selector>
      </div>
    </div>
    <hr />
    <h3 class="mt-4">Create/Manage Relationships</h3>
    <div class="mb-3">
      Select the type of entity relationship item you want to create or manage:
    </div>
    <div class="row row-cols-1 row-cols-md-3 g-4 mb-3">
      <div class="col mt-5">
        <app-create-inventory-selector
          title="Relationships"
          titleClasses="bg-secondary rounded-pill"
          description="Entity relationships define associations between different inventory items, such as linking products to activities or activities to geozones."
          icon="fa-solid fa-circle-nodes"
          link="/inventory/create/relationships"
        ></app-create-inventory-selector>
      </div>
    </div>
    <hr/>
  </div>
</section>
<!-- *ngIf on the outlet itself ensures a previously-mounted child is fully
     destroyed when the URL goes back to /inventory/create (no child), and
     a fresh outlet is created when a new child slug is picked. Defends
     against the stale-child rendering described in #189. -->
<router-outlet *ngIf="!showSelectionOptions()"></router-outlet>
