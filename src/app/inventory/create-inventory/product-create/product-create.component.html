<section class="container pt-3 pb-3">
  <div class="row">
    <div class="col-12">
      <div class="d-flex flex-column align-items-start justify-content-center">
        <h2 class="text-center mb-2">Create a new Product</h2>
      </div>
    </div>
  </div>
</section>
<app-product-form
  [isCreating]="true"
  (formValue)="updateProductForm($event)">
</app-product-form>
<section>
  <div class="d-flex flex-column align-items-center justify-content-center mt-2 mb-5">
    <button class="btn btn-outline-success btn-lg" (click)="submit()" [disabled]="!productForm?.valid">
      <span>Create Product</span>
    </button>
  </div>
</section>
